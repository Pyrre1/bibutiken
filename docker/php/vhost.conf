<VirtualHost *:80>
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        AllowOverride All
        Require all granted
    </Directory>

    <Directory /var/www/html/app>
        Require all denied
    </Directory>
    <Directory /var/www/html/config>
        Require all denied
    </Directory>
</VirtualHost>