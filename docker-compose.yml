services:
  php:
    build:
      context: ./docker/php
    container_name: shop_php
    ports:
      - "8082:80"
    environment:
      DB_HOST: mariadb
      DB_NAME: shop_db
      DB_USER: shop_user
      DB_PASS: shop_pass
    volumes:
      - ./public:/var/www/html/public
      - ./app:/var/www/html/app
      - ./config:/var/www/html/config
    depends_on:
      - mariadb

  mariadb:
    image: mariadb:10.11
    container_name: shop_mariadb
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: shop_db
      MARIADB_USER: shop_user
      MARIADB_PASSWORD: shop_pass
      MARIADB_ROOT_PASSWORD: root_pass
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: shop_phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mariadb
    depends_on:
      - mariadb

volumes:
  mariadb_data: